name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g typescript@5.7.2
      - run: |
          # Install peer deps locally (drop --no-save so they actually land in node_modules
          # where tsc can resolve them; --no-save previously skipped modules that were
          # already marked as peerDependencies without installing them).
          npm install --legacy-peer-deps \
            react@19 react-dom@19 @types/react@19 @types/react-dom@19 \
            next@16 lucide-react@^0.460.0 @types/node@22
          npx tsc --noEmit
        env:
          CI: "true"

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ".[dev]" || pip install -e .
      - name: Import smoke test
        run: python -c "from cyber_common import create_app; app = create_app(title='ci'); print('ok')"
